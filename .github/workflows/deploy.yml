name: Continuous Integration & Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run Tests
        run: cargo test --all-features

