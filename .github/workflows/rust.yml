name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run tests
        run: cargo test --all-features
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - name: Run format
        run: cargo fmt --check
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - name: Install Protoc
        uses: arduino/setup-protoc@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run lint
        run: cargo clippy -- -D warnings  
  coverage:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions-rust-lang/setup-rust-toolchain@v1
          with:
            components: llvm-tools-preview
        - name: Install Protoc
          uses: arduino/setup-protoc@v2
          with:
            repo-token: ${{ secrets.GITHUB_TOKEN }}
        - uses: taiki-e/install-action@cargo-llvm-cov
        - name: Generate code coverage
          run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
        - name: Generate report
          run: cargo llvm-cov report --html --output-dir coverage
        - uses: actions/upload-artifact@v4
          id: upload-coverage-report
          with:
            name: "Coverage report"
            path: coverage/
        - name: Add coverage report link to summary
          run: |
            echo "## [Coverage Report](${{ github.serverUrl }}/${{ github.repository }}/actions/runs/${{ github.runId }}/artifacts/${{ steps.upload-coverage-report.outputs.artifact-id }}/Coverage%20report/index.html)" >> $GITHUB_STEP_SUMMARY
